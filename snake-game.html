<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 8px;
            min-width: 120px;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .sound-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background-color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .toggle-switch.active {
            background-color: #4CAF50;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 28px;
        }

        #gameCanvas {
            border: 3px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 250px;
        }

        .mobile-controls.active {
            display: grid;
        }

        .direction-btn {
            padding: 15px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s;
            min-height: 50px;
        }

        .direction-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #5568d3 0%, #6a3a91 100%);
        }

        .direction-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-cell {
            visibility: hidden;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 44px;
            min-width: 80px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-pause {
            background: #ff9800;
            color: white;
        }

        .btn-pause:hover {
            background: #e68900;
            transform: translateY(-3px);
        }

        .btn-pause:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
            transform: translateY(-3px);
        }

        .instructions {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 0.9em;
            color: #555;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .instructions ul {
            margin-left: 20px;
        }

        .instructions li {
            margin: 5px 0;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .game-over h2 {
            color: #f44336;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .game-over p {
            color: #666;
            margin: 10px 0;
            font-size: 1.2em;
        }

        .game-over button {
            margin-top: 20px;
            background: #667eea;
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
            color: #999;
            font-size: 0.85em;
        }

        .footer span {
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
                border-radius: 10px;
            }

            h1 {
                font-size: 1.6em;
                margin-bottom: 15px;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 15px;
            }

            .info-item {
                padding: 10px 15px;
                min-width: auto;
            }

            .info-value {
                font-size: 1.5em;
            }

            #gameCanvas {
                width: 100%;
                max-width: 400px;
                height: auto;
                margin: 10px auto;
            }

            .controls {
                margin: 15px 0;
                gap: 8px;
            }

            button {
                padding: 10px 15px;
                font-size: 0.9em;
                min-height: 40px;
                min-width: 70px;
            }

            .instructions {
                padding: 10px;
                font-size: 0.85em;
            }

            .instructions ul {
                margin-left: 15px;
            }

            .instructions li {
                margin: 3px 0;
            }

            .mobile-controls.active {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 貪吃蛇遊戲 🐍</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">分數</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">最高分</div>
                <div class="info-value" id="highScore">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">速度</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item sound-toggle">
                <label for="soundToggle">🔊 音效</label>
                <div class="toggle-switch active" id="soundToggle" onclick="toggleSound()"></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="mobile-controls" id="mobileControls">
            <div class="empty-cell"></div>
            <button class="direction-btn" id="upBtn" data-direction="up">⬆️</button>
            <div class="empty-cell"></div>
            <button class="direction-btn" id="leftBtn" data-direction="left">⬅️</button>
            <div class="empty-cell"></div>
            <button class="direction-btn" id="rightBtn" data-direction="right">➡️</button>
            <div class="empty-cell"></div>
            <button class="direction-btn" id="downBtn" data-direction="down">⬇️</button>
            <div class="empty-cell"></div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startGame()">開始遊戲</button>
            <button class="btn-pause" id="pauseBtn" onclick="togglePause()" disabled>暫停</button>
            <button class="btn-reset" id="resetBtn" onclick="resetGame()">重新開始</button>
        </div>

        <div class="instructions">
            <h3>遊戲說明</h3>
            <ul>
                <li>📌 電腦版: 方向鍵或 WASD 控制蛇的方向</li>
                <li>📱 手機版: 點擊虛擬方向鍵控制蛇的方向</li>
                <li>🍎 吃掉紅色食物增加分數</li>
                <li>⚠️ 撞牆或撞到自己會遊戲結束</li>
                <li>⬆️ 每吃10個食物遊戲速度加快</li>
                <li>🔄 按暫停可以暫停/繼續遊戲</li>
            </ul>
        </div>

        <div class="footer">
            設計者：<span>陳冠傑</span>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>遊戲結束！</h2>
        <p>最終分數: <span id="finalScore">0</span></p>
        <p>最高分: <span id="finalHighScore">0</span></p>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const levelDisplay = document.getElementById('level');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const gameOverModal = document.getElementById('gameOverModal');
        const overlay = document.getElementById('overlay');
        const soundToggle = document.getElementById('soundToggle');
        const mobileControls = document.getElementById('mobileControls');

        // 檢測是否為手機設備
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                   window.innerWidth <= 768;
        };

        // 調整canvas大小以適應屏幕
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(400, container.clientWidth - 20);
            const scale = maxWidth / 400;
            
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = maxWidth + 'px';
        }

        // 遊戲參數
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 100;
        let soundEnabled = true;

        // Web Audio API 音效管理
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // 音效函數
        function playSound(frequency, duration, type = 'sine') {
            if (!soundEnabled) return;

            try {
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.type = type;
                osc.frequency.value = frequency;

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.start(now);
                osc.stop(now + duration);
            } catch (e) {
                console.log('音效播放出錯:', e);
            }
        }

        // 吃食物音效 - 高音
        function playEatSound() {
            playSound(400, 0.1);
            setTimeout(() => playSound(600, 0.1), 50);
        }

        // 撞牆/自撲音效 - 低音
        function playGameOverSound() {
            playSound(200, 0.2);
            setTimeout(() => playSound(150, 0.2), 100);
            setTimeout(() => playSound(100, 0.3), 200);
        }

        // 開始遊戲音效
        function playStartSound() {
            playSound(300, 0.15);
            setTimeout(() => playSound(400, 0.15), 100);
            setTimeout(() => playSound(500, 0.2), 200);
        }

        // 暫停音效
        function playPauseSound() {
            playSound(350, 0.1);
            setTimeout(() => playSound(350, 0.1), 150);
        }

        // 升級速度音效
        function playLevelUpSound() {
            playSound(500, 0.1);
            setTimeout(() => playSound(600, 0.1), 100);
            setTimeout(() => playSound(700, 0.15), 200);
        }

        // 切換音效開關
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggle.classList.toggle('active');
            if (soundEnabled) {
                playStartSound();
            }
        }

        // 初始化
        highScoreDisplay.textContent = highScore;

        // 繪製遊戲
        function draw() {
            // 清空畫布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製網格
            ctx.strokeStyle = '#2a2a4e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 繪製蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇頭
                    ctx.fillStyle = '#4CAF50';
                    ctx.shadowColor = '#2c3e1f';
                    ctx.shadowBlur = 5;
                } else {
                    // 蛇身
                    ctx.fillStyle = '#66BB6A';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0)';
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                ctx.shadowColor = 'rgba(0, 0, 0, 0)';
            });

            // 繪製食物
            ctx.fillStyle = '#FF6B6B';
            ctx.shadowColor = '#cc0000';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowColor = 'rgba(0, 0, 0, 0)';
        }

        // 更新遊戲狀態
        function update() {
            if (!gameRunning || gamePaused) return;

            // 更新方向
            direction = nextDirection;

            // 計算新的蛇頭位置
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 檢查碰牆
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // 檢查自相撲
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            // 加入新頭部
            snake.unshift(head);

            // 檢查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                playEatSound();

                // 更新等級和速度
                const newLevel = Math.floor(score / 100) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    levelDisplay.textContent = level;
                    gameSpeed = Math.max(50, 100 - (level - 1) * 10);
                    playLevelUpSound();
                } else {
                    levelDisplay.textContent = level;
                }

                // 生成新食物
                generateFood();
            } else {
                // 移除蛇尾（如果沒吃到食物）
                snake.pop();
            }
        }

        // 生成食物
        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        // 開始遊戲
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                gameOverModal.classList.remove('show');
                overlay.classList.remove('show');
                playStartSound();
                gameLoop();
            }
        }

        // 暫停/繼續
        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                pauseBtn.textContent = gamePaused ? '繼續' : '暫停';
                playPauseSound();
                if (!gamePaused) {
                    gameLoop();
                }
            }
        }

        // 重置遊戲
        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            level = 1;
            gameSpeed = 100;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暫停';
            generateFood();
            draw();
            gameOverModal.classList.remove('show');
            overlay.classList.remove('show');
        }

        // 遊戲結束
        function endGame() {
            gameRunning = false;
            gamePaused = false;
            playGameOverSound();

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }

            // 顯示遊戲結束彈窗
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            gameOverModal.classList.add('show');
            overlay.classList.add('show');

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暫停';
        }

        // 遊戲循環
        function gameLoop() {
            update();
            draw();

            if (gameRunning && !gamePaused) {
                setTimeout(gameLoop, gameSpeed);
            }
        }

        // 鍵盤控制
        document.addEventListener('keydown', (event) => {
            if (!gameRunning) return;

            switch (event.key.toUpperCase()) {
                case 'ARROWUP':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    event.preventDefault();
                    break;
                case 'ARROWDOWN':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    event.preventDefault();
                    break;
                case 'ARROWLEFT':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    event.preventDefault();
                    break;
                case 'ARROWRIGHT':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    event.preventDefault();
                    break;
            }
        });

        // 虛擬方向鍵控制
        function setupMobileControls() {
            // 顯示虛擬方向鍵
            if (isMobileDevice()) {
                mobileControls.classList.add('active');
            }

            // 上鍵
            document.getElementById('upBtn').addEventListener('click', () => {
                if (gameRunning && direction.y === 0) {
                    nextDirection = { x: 0, y: -1 };
                }
            });

            // 下鍵
            document.getElementById('downBtn').addEventListener('click', () => {
                if (gameRunning && direction.y === 0) {
                    nextDirection = { x: 0, y: 1 };
                }
            });

            // 左鍵
            document.getElementById('leftBtn').addEventListener('click', () => {
                if (gameRunning && direction.x === 0) {
                    nextDirection = { x: -1, y: 0 };
                }
            });

            // 右鍵
            document.getElementById('rightBtn').addEventListener('click', () => {
                if (gameRunning && direction.x === 0) {
                    nextDirection = { x: 1, y: 0 };
                }
            });
        }

        // 防止移動設備上的滾動
        document.addEventListener('touchmove', (e) => {
            if (gameRunning) {
                e.preventDefault();
            }
        }, { passive: false });

        // 初始化
        function initialize() {
            resizeCanvas();
            setupMobileControls();
            generateFood();
            draw();
        }

        // 監聽窗口大小變化
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // 頁面加載完成後初始化
        initialize();
    </script>
</body>
</html>
