<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini 2.5 Flash 範例</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f7fb;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 26px;
      color: #1f2937;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 15px;
      resize: vertical;
    }
    textarea {
      min-height: 140px;
    }
    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 12px;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .output {
      margin-top: 20px;
      padding: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      min-height: 120px;
      white-space: pre-wrap;
      color: #0f172a;
    }
    .note {
      margin-top: 12px;
      color: #475569;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gemini 2.5 Flash 測試頁面</h1>
    <p class="note">輸入 Gemini API 金鑰、問題，按下「送出訊息」即可查看回覆。</p>

    <label for="apiKey">Gemini API Key</label>
    <input id="apiKey" type="text" placeholder="輸入你的 API Key" />

    <label for="userPrompt">詢問問題</label>
    <textarea id="userPrompt" placeholder="請輸入你想問的問題..."></textarea>

    <button id="submitButton">送出訊息</button>

    <div class="output" id="replyBox">回覆會顯示在這裡。</div>
  </div>

  <script>
    const apiKeyInput = document.getElementById('apiKey');
    const userPromptInput = document.getElementById('userPrompt');
    const submitButton = document.getElementById('submitButton');
    const replyBox = document.getElementById('replyBox');

    apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';

    function setReply(text) {
      replyBox.textContent = text;
    }

    async function sendMessage() {
      const apiKey = apiKeyInput.value.trim();
      const prompt = userPromptInput.value.trim();
      if (!apiKey) {
        setReply('請先輸入 Gemini API Key。');
        return;
      }
      if (!prompt) {
        setReply('請先輸入問題內容。');
        return;
      }

      localStorage.setItem('geminiApiKey', apiKey);
      setReply('正在傳送請求，請稍候...');
      submitButton.disabled = true;

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: 'gemini-2.5-flash',
            messages: [
              { role: 'user', content: prompt }
            ],
            max_tokens: 500,
          }),
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => null);
          const errorMessage = errorData?.error?.message || response.statusText;
          throw new Error(`API 錯誤: ${errorMessage}`);
        }

        const result = await response.json();
        const replyText = result.choices?.[0]?.message?.content || '未收到回覆內容。';
        setReply(replyText);
      } catch (error) {
        console.error(error);
        setReply(`發生錯誤：${error.message}`);
      } finally {
        submitButton.disabled = false;
      }
    }

    submitButton.addEventListener('click', sendMessage);
    userPromptInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && event.ctrlKey) {
        sendMessage();
      }
    });
  </script>
</body>
</html>
